# One-click deploy template for the DigitalOcean "Deploy to DigitalOcean" button.
# This is the demo configuration: models are pre-configured; users supply their
# own DigitalOcean API key at runtime via the in-app UI.
#
# Kept in sync with .do/app-demo.yaml — if you update that file, mirror the
# changes here (the only structural difference is the top-level `spec:` wrapper).
spec:
  name: llm-comparator
  region: nyc

  envs:
    - key: MODEL_1_ENDPOINT
      scope: RUN_AND_BUILD_TIME
      value: "https://inference.do-ai.run"
    - key: MODEL_1_NAME
      scope: RUN_AND_BUILD_TIME
      value: "NemoTron 3 120B"
    - key: MODEL_1_MODEL_ID
      scope: RUN_AND_BUILD_TIME
      value: "nvidia-nemotron-3-super-120b"
    - key: MODEL_2_ENDPOINT
      scope: RUN_AND_BUILD_TIME
      value: "https://inference.do-ai.run"
    - key: MODEL_2_NAME
      scope: RUN_AND_BUILD_TIME
      value: "GPT-OSS 120B"
    - key: MODEL_2_MODEL_ID
      scope: RUN_AND_BUILD_TIME
      value: "openai-gpt-oss-120b"
    - key: MODEL_3_ENDPOINT
      scope: RUN_AND_BUILD_TIME
      value: "https://inference.do-ai.run"
    - key: MODEL_3_NAME
      scope: RUN_AND_BUILD_TIME
      value: "Llama 3 70B"
    - key: MODEL_3_MODEL_ID
      scope: RUN_AND_BUILD_TIME
      value: "llama3.3-70b-instruct"
    - key: PREFERENCE_MODEL_ENDPOINT
      scope: RUN_AND_BUILD_TIME
      value: "https://inference.do-ai.run"
    - key: PREFERENCE_MODEL_NAME
      scope: RUN_AND_BUILD_TIME
      value: "Claude 4.6 Sonnet"
    - key: PREFERENCE_MODEL_MODEL_ID
      scope: RUN_AND_BUILD_TIME
      value: "anthropic-claude-4.6-sonnet"
    - key: DATABASE_URL
      scope: RUN_AND_BUILD_TIME
      value: "sqlite+aiosqlite:////tmp/llm_comparator.db"
    - key: DEMO_MODE
      scope: RUN_AND_BUILD_TIME
      value: "true"
    - key: DEMO_SESSION_TTL_HOURS
      scope: RUN_AND_BUILD_TIME
      value: "24"

  services:
    - name: llm-comparator-backend
      github:
        repo: oconnoob/llm-comparator-pub
        branch: main
        deploy_on_push: false
      source_dir: /
      run_command: uvicorn app.main:app --host 0.0.0.0 --port 8080
      http_port: 8080
      instance_size_slug: basic-s
      instance_count: 1
      routes:
        - path: /api

  static_sites:
    - name: llm-comparator
      github:
        repo: oconnoob/llm-comparator-pub
        branch: main
        deploy_on_push: false
      source_dir: frontend
      build_command: npm install && npm run build
      output_dir: dist
      routes:
        - path: /
