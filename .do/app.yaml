name: llm-comparator
region: nyc

# App-level env vars: shared by all components.
# Set MODEL_*_API_KEY values via the App Platform dashboard (mark as SECRET).
# You can use either the [Serverless Inference](https://docs.digitalocean.com/products/gradient-ai-platform/how-to/use-serverless-inference/) endpoint, or
# A dedicated model endpoint for each endpoint via [Dedicated Inference](https://docs.digitalocean.com/products/gradient-ai-platform/how-to/use-dedicated-inference-platform/)
envs:
  - key: MODEL_1_ENDPOINT
    scope: RUN_AND_BUILD_TIME
    value: "https://inference.do-ai.run"
  - key: MODEL_1_NAME
    scope: RUN_AND_BUILD_TIME
    value: "Model 1"
  - key: MODEL_1_MODEL_ID
    scope: RUN_AND_BUILD_TIME
    value: "your-model-id"
  - key: MODEL_1_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: "your-api-key"

  - key: MODEL_2_ENDPOINT
    scope: RUN_AND_BUILD_TIME
    value: "https://inference.do-ai.run"
  - key: MODEL_2_NAME
    scope: RUN_AND_BUILD_TIME
    value: "Model 2"
  - key: MODEL_2_MODEL_ID
    scope: RUN_AND_BUILD_TIME
    value: "your-model-id"
  - key: MODEL_2_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: "your-api-key"

  - key: MODEL_3_ENDPOINT
    scope: RUN_AND_BUILD_TIME
    value: "https://inference.do-ai.run"
  - key: MODEL_3_NAME
    scope: RUN_AND_BUILD_TIME
    value: "Model 3"
  - key: MODEL_3_MODEL_ID
    scope: RUN_AND_BUILD_TIME
    value: "your-model-id"
  - key: MODEL_3_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: "your-api-key"

  - key: PREFERENCE_MODEL_ENDPOINT
    scope: RUN_AND_BUILD_TIME
    value: "https://inference.do-ai.run"
  - key: PREFERENCE_MODEL_NAME
    scope: RUN_AND_BUILD_TIME
    value: "Preference Model"
  - key: PREFERENCE_MODEL_MODEL_ID
    scope: RUN_AND_BUILD_TIME
    value: "your-preference-model-id"
  - key: PREFERENCE_MODEL_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: "your-api-key"

  - key: DATABASE_URL
    scope: RUN_AND_BUILD_TIME
    value: "sqlite+aiosqlite:////tmp/llm_comparator.db"
  # For persistent history across deploys, attach a DO Managed Database and
  # replace the value above with:
  # value: "postgresql+asyncpg://user:password@host/dbname"

# 1. THE FASTAPI BACKEND
services:
  - name: llm-comparator-backend
    github:
      repo: oconnoob/llm-comparator
      branch: main
      deploy_on_push: true
    source_dir: /
    run_command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    http_port: 8080
    instance_size_slug: basic-s
    instance_count: 1
    routes:
      - path: /api

# 2. THE VITE FRONTEND
static_sites:
  - name: llm-comparator
    github:
      repo: oconnoob/llm-comparator
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm install && npm run build
    output_dir: dist
    routes:
      - path: /
